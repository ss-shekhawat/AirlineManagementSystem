<!doctype html>
<html>
  <head>
    <title>Airline Dashboard</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/airline.css" />
  </head>
  <body>
    <header class="admin-header">
      <div>
        <h2>Airline Panel</h2>
      </div>
      <div>
        <span id="airlineName"></span>
        <button onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="dashboard-container">
      <div class="card" onclick="goTo('airline-schedule.html')">
        <h3>1. Schedule Flights</h3>
      </div>

      <div class="card" onclick="goTo('airline-viewflights.html')">
        <h3>2. View / Manage Flights</h3>
      </div>

      <div class="card" onclick="goTo('airline-managebookings.html')">
        <h3>3. Manage Bookings</h3>
      </div>

      <div class="card" onclick="goTo('airline-profile.html')">
        <h3>4. View / Update Profile</h3>
      </div>

      <div class="card" onclick="goTo('airline-password.html')">
        <h3>5. Change Password</h3>
      </div>
    </div>

    <script src="../js/admin-layout.js"></script>
    <script>
      document.getElementById("airlineName").innerText =
        "Airline: " + localStorage.getItem("userId");

      function goTo(page) {
        window.location.href = page;
      }
    </script>
  </body>
</html>
